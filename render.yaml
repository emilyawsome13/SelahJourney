services:
  - type: web
    name: selah-journey
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GMAIL_SMTP_EMAIL
        sync: false
      - key: GMAIL_SMTP_APP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: DATA_DIR
        sync: false
